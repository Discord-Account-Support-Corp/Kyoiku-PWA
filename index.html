<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Kyoiku</title>

<link rel="manifest" href="manifest.json">

<meta name="theme-color" content="#0f172a">

<style>
html,body{
margin:0;
height:100%;
background:#0f172a;
font-family:sans-serif;
}

.wrap{
height:100%;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
color:white;
}

button{
border:none;
padding:16px 24px;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}
</style>
</head>

<body>

<div class="wrap">
<h1>Kyoiku Wiki</h1>

<button id="openBtn">
Open Wiki
</button>
</div>

<script>
document
.getElementById("openBtn")
.addEventListener("click", () => {

window.location.assign(
"https://dasccorp.kyoikuportal.com/wiki/Main_Page"
);

});
</script>

</body>
</html>
